<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#1b1140" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>🐾 Skaner Zwierząt</title>
<style>
  :root { --bg1:#2b1a66; --bg2:#5b2a86; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; height:100%; overflow:hidden; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  body {
    background: radial-gradient(circle at 30% 20%, #6a3aa8 0%, var(--bg1) 55%, #160c33 100%);
    color:#fff; height:100vh; height:100dvh; user-select:none;
    display:flex; flex-direction:column;
  }
  /* pole przechwytujące skan z Zebry (DataWedge "keyboard wedge") */
  #catcher { position:fixed; top:-200px; left:0; width:10px; height:10px; opacity:0; }

  header {
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 14px; font-weight:700; letter-spacing:.3px;
    background:rgba(0,0,0,.18);
  }
  header .title { font-size:18px; }
  header .btns button {
    background:rgba(255,255,255,.15); color:#fff; border:none; border-radius:12px;
    font-size:18px; padding:8px 12px; margin-left:6px; cursor:pointer;
  }
  header .btns button:active { transform:scale(.92); }

  main { flex:1; display:flex; align-items:center; justify-content:center; position:relative; padding:10px; }

  /* ekran startowy */
  .idle { text-align:center; animation: floaty 3s ease-in-out infinite; }
  .idle .scan-emoji { font-size: clamp(90px, 28vw, 220px); filter: drop-shadow(0 8px 20px rgba(0,0,0,.4)); }
  .idle .hint { font-size: clamp(20px, 5vw, 32px); margin-top:10px; font-weight:800; }
  .idle .sub { opacity:.8; margin-top:6px; font-size: clamp(13px,3.4vw,18px); }
  @keyframes floaty { 0%,100%{ transform: translateY(0) } 50%{ transform: translateY(-14px) } }

  /* karta zwierzęcia */
  .stage { text-align:center; display:none; }
  .stage.show { display:block; }
  .animal {
    font-size: clamp(140px, 46vw, 380px); line-height:1;
    filter: drop-shadow(0 14px 28px rgba(0,0,0,.45));
    will-change: transform;
  }
  .animal img { width: clamp(180px, 56vw, 460px); height:auto; border-radius:24px;
    box-shadow:0 14px 28px rgba(0,0,0,.45); object-fit:cover; }
  .name {
    margin-top:14px; font-size: clamp(34px, 10vw, 90px); font-weight:900;
    text-shadow:0 4px 0 rgba(0,0,0,.2); letter-spacing:1px;
  }

  /* animacje pojawienia + ruch */
  @keyframes pop { 0%{ transform:scale(0) rotate(-25deg); opacity:0 } 60%{ transform:scale(1.25) rotate(8deg); opacity:1 } 100%{ transform:scale(1) rotate(0) } }
  @keyframes bounce { 0%,100%{ transform: translateY(0) } 50%{ transform: translateY(-40px) } }
  @keyframes wiggle { 0%,100%{ transform: rotate(-9deg) } 50%{ transform: rotate(9deg) } }
  @keyframes walk { 0%{ transform: translateX(-46vw) scaleX(1) } 49%{ transform: translateX(46vw) scaleX(1) } 50%{ transform: translateX(46vw) scaleX(-1) } 100%{ transform: translateX(-46vw) scaleX(-1) } }
  @keyframes spin { 0%{ transform: rotate(0) } 100%{ transform: rotate(360deg) } }
  @keyframes hop { 0%,100%{ transform: translateY(0) rotate(0) } 25%{ transform: translateY(-30px) rotate(-8deg) } 75%{ transform: translateY(-30px) rotate(8deg) } }
  .anim-pop    { animation: pop .6s ease-out; }
  .anim-bounce { animation: pop .6s ease-out, bounce .8s ease-in-out .6s infinite; }
  .anim-wiggle { animation: pop .6s ease-out, wiggle .5s ease-in-out .6s infinite; }
  .anim-walk   { animation: pop .6s ease-out, walk 4s linear .6s infinite; }
  .anim-hop    { animation: pop .6s ease-out, hop 1s ease-in-out .6s infinite; }
  .anim-spin   { animation: pop .6s ease-out, spin 3s linear .6s infinite; }

  /* konfetti */
  .confetti { position:fixed; top:-20px; width:12px; height:18px; border-radius:3px; pointer-events:none; z-index:30; }
  @keyframes fall { to { transform: translateY(110vh) rotate(540deg); opacity:.2 } }

  /* nakładka błędu */
  .oops { display:none; text-align:center; }
  .oops .q { font-size: clamp(100px, 30vw, 200px); }
  .oops .t { font-size: clamp(22px, 6vw, 40px); font-weight:800; margin-top:10px; }

  /* panel ustawień */
  .panel { position:fixed; inset:0; background:rgba(10,6,28,.92); display:none; z-index:40;
    padding:22px; overflow:auto; }
  .panel.show { display:block; }
  .panel h2 { margin-top:0; }
  .panel .row { margin:16px 0; }
  .panel label { display:block; font-weight:700; margin-bottom:6px; }
  .panel input[type=range] { width:100%; }
  .panel button, .panel .filebtn {
    display:inline-block; background:#7c4dff; color:#fff; border:none; border-radius:12px;
    padding:12px 16px; font-size:16px; font-weight:700; cursor:pointer; margin:6px 6px 0 0;
  }
  .panel .ghost { background:rgba(255,255,255,.12); }
  .panel .close { position:absolute; top:14px; right:14px; }
  .panel input[type=file] { display:none; }
  .panel .test { font-size:30px; padding:10px 14px; }
  .panel small { opacity:.7; }
  .toast { position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
    background:#000a; padding:12px 18px; border-radius:14px; font-weight:700; display:none; z-index:50; }
</style>
</head>
<body>
  <!-- niewidoczne pole przechwytujące dane skanera (DataWedge) -->
  <input id="catcher" inputmode="none" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />

  <header>
    <div class="title">🐾 Skaner Zwierząt</div>
    <div class="btns">
      <button id="fsBtn" title="Pełny ekran">⛶</button>
      <button id="setBtn" title="Ustawienia">⚙️</button>
    </div>
  </header>

  <main id="main">
    <div class="idle" id="idle">
      <div class="scan-emoji">🦓</div>
      <div class="hint">Zeskanuj kod kreskowy!</div>
      <div class="sub">Wyceluj skanerem w obrazek z kodem 🔍</div>
    </div>

    <div class="stage" id="stage">
      <div class="animal" id="animal"></div>
      <div class="name" id="name"></div>
    </div>

    <div class="oops" id="oops">
      <div class="q">🤔</div>
      <div class="t">Nie znam tego kodu… spróbuj inny!</div>
    </div>
  </main>

  <!-- ustawienia -->
  <div class="panel" id="panel">
    <button class="close ghost" id="closeBtn">✕</button>
    <h2>⚙️ Ustawienia</h2>

    <div class="row">
      <label>🔊 Głośność</label>
      <input type="range" id="vol" min="0" max="1" step="0.05" value="0.8" />
    </div>

    <div class="row">
      <label>🎬 Styl animacji</label>
      <select id="animStyle" style="font-size:16px;padding:10px;border-radius:10px;">
        <option value="auto">Automatyczny (różny)</option>
        <option value="bounce">Skakanie</option>
        <option value="wiggle">Kołysanie</option>
        <option value="walk">Chodzenie</option>
        <option value="hop">Podskoki</option>
        <option value="spin">Obracanie</option>
        <option value="pop">Tylko pojawienie</option>
      </select>
    </div>

    <div class="row">
      <label>🧪 Test bez skanera</label>
      <input id="manual" placeholder="np. LEW  lub  ZOO:LEW" style="font-size:18px;padding:10px;border-radius:10px;width:100%;max-width:320px;" />
      <div><button id="manualGo">Pokaż zwierzę</button></div>
      <small>Na Zebrze skanowanie działa automatycznie (DataWedge wpisuje kod).</small>
    </div>

    <div class="row">
      <label>📦 Własne zwierzęta (ze Studio)</label>
      <label class="filebtn" for="impFile">📥 Wczytaj plik katalogu (.json)</label>
      <input type="file" id="impFile" accept="application/json,.json" />
      <button class="ghost" id="clearBtn">🗑️ Wyczyść własne</button>
      <div><small id="customInfo"></small></div>
    </div>

    <div class="row">
      <label>🐾 Dostępne zwierzęta</label>
      <div id="catList" style="line-height:2;"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="shared.js"></script>
  <script>
  (function () {
    "use strict";
    const $ = (id) => document.getElementById(id);
    const catcher = $("catcher");

    /* ---------- import katalogu z linku #cat=... (transfer ze Studio) ---------- */
    (function importFromHash() {
      const m = location.hash.match(/cat=([^&]+)/);
      if (!m) return;
      try {
        const data = JSON.parse(ZOO.b64decodeUnicode(decodeURIComponent(m[1])));
        const animals = data.animals || [];
        animals.forEach((a) => ZOO.storage.upsert(ZOO.normalize(a)));
        if (animals.length) toast("Wczytano " + animals.length + " własnych zwierząt 🎉");
      } catch (e) { /* ignoruj */ }
    })();

    /* ---------------------- przechwytywanie skanu ---------------------- */
    // DataWedge na Zebrze domyślnie wpisuje treść kodu jako klawisze + Enter.
    let buf = "";
    let lastKey = 0;

    function focusCatcher() {
      if ($("panel").classList.contains("show")) return; // nie kradnij focusa w ustawieniach
      try { catcher.focus({ preventScroll: true }); } catch (e) { catcher.focus(); }
    }

    catcher.addEventListener("keydown", (e) => {
      const now = Date.now();
      if (now - lastKey > 120) buf = ""; // nowy skan, jeśli przerwa
      lastKey = now;
      if (e.key === "Enter") {
        e.preventDefault();
        handleScan(buf);
        buf = "";
        catcher.value = "";
      } else if (e.key.length === 1) {
        buf += e.key;
      }
    });

    // utrzymuj focus na polu skanera
    document.addEventListener("click", focusCatcher);
    document.addEventListener("touchend", focusCatcher);
    window.addEventListener("focus", focusCatcher);
    setInterval(focusCatcher, 1500);

    /* ------------------------- wyświetlanie ---------------------------- */
    const ANIM_BY_SOUND = {
      roar: "bounce", growl: "bounce", trumpet: "walk", bark: "hop", meow: "wiggle",
      moo: "walk", neigh: "walk", oink: "hop", baa: "wiggle", quack: "hop",
      ribbit: "hop", monkey: "hop", howl: "wiggle", cluck: "hop", rooster: "wiggle",
      hoot: "wiggle", hiss: "wiggle", buzz: "spin", blub: "wiggle", tweet: "hop", chime: "spin"
    };
    const ALL_ANIMS = ["bounce", "wiggle", "walk", "hop", "spin"];

    function pickAnim(animal) {
      const style = localStorage.getItem("zoo_anim") || "auto";
      if (style !== "auto") return style;
      return ANIM_BY_SOUND[animal.sound] || ALL_ANIMS[Math.floor(Math.random() * ALL_ANIMS.length)];
    }

    let hideTimer = null;
    function handleScan(raw) {
      ZOO.Sound.unlock();
      const animal = ZOO.parseScan(raw);
      if (!animal) { showOops(); return; }
      showAnimal(animal);
    }

    function showAnimal(animal) {
      clearTimeout(hideTimer);
      $("idle").style.display = "none";
      $("oops").style.display = "none";
      const stage = $("stage");
      const el = $("animal");

      // obraz: własny (image) lub emoji
      if (animal.image) {
        el.innerHTML = '<img alt="' + animal.name + '" src="' + animal.image + '">';
      } else {
        el.textContent = animal.emoji || "❓";
      }
      $("name").textContent = animal.name;

      const anim = pickAnim(animal);
      el.className = "animal"; // reset
      void el.offsetWidth;     // restart animacji
      el.classList.add("anim-" + anim);

      stage.classList.add("show");
      confetti();
      ZOO.Sound.playAnimal(animal);

      // po chwili wróć do ekranu startowego
      hideTimer = setTimeout(() => {
        stage.classList.remove("show");
        $("idle").style.display = "block";
      }, 9000);
    }

    function showOops() {
      clearTimeout(hideTimer);
      $("idle").style.display = "none";
      $("stage").classList.remove("show");
      $("oops").style.display = "block";
      ZOO.Sound.effect("blub");
      hideTimer = setTimeout(() => {
        $("oops").style.display = "none";
        $("idle").style.display = "block";
      }, 3500);
    }

    function confetti() {
      const colors = ["#ff5e7e", "#ffd166", "#06d6a0", "#4cc9f0", "#b388ff", "#ff9f1c"];
      for (let i = 0; i < 28; i++) {
        const c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random() * 100 + "vw";
        c.style.background = colors[i % colors.length];
        c.style.animation = "fall " + (1.6 + Math.random() * 1.4) + "s ease-in " + (Math.random() * 0.3) + "s forwards";
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 3500);
      }
    }

    /* --------------------------- ustawienia ---------------------------- */
    function toast(msg) {
      const t = $("toast"); t.textContent = msg; t.style.display = "block";
      setTimeout(() => (t.style.display = "none"), 2600);
    }

    $("setBtn").onclick = () => { $("panel").classList.add("show"); renderCatList(); refreshCustomInfo(); };
    $("closeBtn").onclick = () => { $("panel").classList.remove("show"); focusCatcher(); };

    $("vol").value = localStorage.getItem("zoo_vol") || 0.8;
    ZOO.Sound.setVolume(parseFloat($("vol").value));
    $("vol").oninput = (e) => {
      ZOO.Sound.setVolume(parseFloat(e.target.value));
      localStorage.setItem("zoo_vol", e.target.value);
    };

    $("animStyle").value = localStorage.getItem("zoo_anim") || "auto";
    $("animStyle").onchange = (e) => localStorage.setItem("zoo_anim", e.target.value);

    $("manualGo").onclick = () => { ZOO.Sound.unlock(); handleScan($("manual").value); };
    $("manual").addEventListener("keydown", (e) => { if (e.key === "Enter") $("manualGo").click(); });

    $("impFile").onchange = (e) => {
      const f = e.target.files[0]; if (!f) return;
      const r = new FileReader();
      r.onload = () => {
        try {
          const n = ZOO.storage.importJSON(r.result);
          toast("Dodano " + n + " zwierząt 🎉");
          renderCatList(); refreshCustomInfo();
        } catch (err) { toast("Błąd pliku 😕"); }
      };
      r.readAsText(f);
    };

    $("clearBtn").onclick = () => {
      ZOO.storage.saveCustom([]);
      toast("Wyczyszczono własne zwierzęta");
      renderCatList(); refreshCustomInfo();
    };

    function refreshCustomInfo() {
      const n = ZOO.storage.loadCustom().length;
      $("customInfo").textContent = n ? ("Własnych zwierząt: " + n) : "Brak własnych zwierząt — używamy domyślnych.";
    }

    function renderCatList() {
      $("catList").innerHTML = ZOO.getCatalog()
        .map((a) => '<span style="display:inline-block;margin:2px 8px;">' + (a.emoji || "🖼️") + " " + a.name + "</span>")
        .join("");
    }

    /* --------------------------- pełny ekran --------------------------- */
    $("fsBtn").onclick = () => {
      const el = document.documentElement;
      if (!document.fullscreenElement) (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
      else (document.exitFullscreen || document.webkitExitFullscreen).call(document);
    };

    // załaduj głosy TTS i odblokuj audio przy pierwszej interakcji
    if (window.speechSynthesis) window.speechSynthesis.getVoices();
    window.addEventListener("pointerdown", () => ZOO.Sound.unlock(), { once: true });

    focusCatcher();

    // offline na Zebrze
    if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    }
  })();
  </script>
</body>
</html>
